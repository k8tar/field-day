<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <dropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background rounded rectangle -->
  <rect x="5" y="5" width="390" height="110" rx="15" ry="15" fill="url(#bgGradient)" stroke="#1e40af" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Radio waves (positioned on left side) -->
  <g stroke="url(#waveGradient)" stroke-width="2" fill="none">
    <circle cx="60" cy="60" r="18" opacity="0.8"/>
    <circle cx="60" cy="60" r="26" opacity="0.6"/>
    <circle cx="60" cy="60" r="34" opacity="0.4"/>
  </g>
  
  <!-- Central antenna/tower (left side) -->
  <g fill="#ffffff">
    <!-- Base -->
    <rect x="57" y="85" width="6" height="6" rx="1"/>
    <!-- Main tower -->
    <rect x="58.5" y="40" width="3" height="45" rx="0.5"/>
    <!-- Top element -->
    <rect x="56" y="38" width="8" height="1.5" rx="0.75"/>
    <!-- Cross elements -->
    <rect x="54" y="50" width="12" height="0.8" rx="0.4"/>
    <rect x="54" y="60" width="12" height="0.8" rx="0.4"/>
    <rect x="54" y="70" width="12" height="0.8" rx="0.4"/>
  </g>
  
  <!-- Main Title Text -->
  <text x="200" y="45" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="32" font-weight="bold">K8TAR FIELD DAY</text>
  
  <!-- Logger Text -->
  <text x="200" y="75" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="18" font-weight="normal">AMATEUR RADIO LOGGER</text>
  
  <!-- Right side decorative elements -->
  <g fill="#60a5fa" opacity="0.6">
    <circle cx="330" cy="30" r="2"/>
    <circle cx="340" cy="25" r="1.5"/>
    <circle cx="325" cy="20" r="1.5"/>
    <circle cx="335" cy="90" r="2"/>
    <circle cx="345" cy="85" r="1.5"/>
    <circle cx="320" cy="95" r="1.5"/>
  </g>
  
  <!-- Signal indicator dots with animation -->
  <g>
    <circle cx="370" cy="20" r="1.5" fill="#00ff00" opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="365" cy="24" r="1" fill="#00ff00" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="375" cy="26" r="1" fill="#00ff00" opacity="0.4">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
