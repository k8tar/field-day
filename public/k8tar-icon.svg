<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with subtle shadow -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGradient)" stroke="#1e40af" stroke-width="4"/>
  
  <!-- Radio waves -->
  <g stroke="url(#waveGradient)" stroke-width="4" fill="none">
    <circle cx="128" cy="128" r="50" opacity="0.9"/>
    <circle cx="128" cy="128" r="70" opacity="0.7"/>
    <circle cx="128" cy="128" r="90" opacity="0.5"/>
  </g>
  
  <!-- Central antenna/tower -->
  <g fill="#ffffff">
    <!-- Base -->
    <rect x="118" y="180" width="20" height="15" rx="3"/>
    <!-- Main tower -->
    <rect x="123" y="75" width="10" height="105" rx="2"/>
    <!-- Top element -->
    <rect x="116" y="70" width="24" height="6" rx="3"/>
    <!-- Cross elements -->
    <rect x="113" y="95" width="30" height="3" rx="1.5"/>
    <rect x="113" y="125" width="30" height="3" rx="1.5"/>
    <rect x="113" y="155" width="30" height="3" rx="1.5"/>
  </g>
  
  <!-- Simplified text for icon -->
  <text x="128" y="45" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">FD</text>
</svg>
