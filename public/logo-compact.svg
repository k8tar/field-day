<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="32" viewBox="0 0 120 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded rectangle -->
  <rect x="1" y="1" width="118" height="30" rx="6" ry="6" fill="url(#bgGradient)" stroke="#1e40af" stroke-width="1"/>
  
  <!-- Radio waves (positioned on left side) -->
  <g stroke="url(#waveGradient)" stroke-width="1" fill="none">
    <circle cx="16" cy="16" r="5" opacity="0.8"/>
    <circle cx="16" cy="16" r="8" opacity="0.6"/>
    <circle cx="16" cy="16" r="11" opacity="0.4"/>
  </g>
  
  <!-- Central antenna/tower (left side) -->
  <g fill="#ffffff">
    <!-- Base -->
    <rect x="14" y="24" width="4" height="2" rx="1"/>
    <!-- Main tower -->
    <rect x="15" y="8" width="2" height="16" rx="0.5"/>
    <!-- Top element -->
    <rect x="12" y="6" width="8" height="1" rx="0.5"/>
    <!-- Cross elements -->
    <rect x="11" y="13" width="10" height="0.5" rx="0.25"/>
    <rect x="11" y="19" width="10" height="0.5" rx="0.25"/>
  </g>
  
  <!-- Main Title Text -->
  <text x="60" y="14" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9" font-weight="bold">K8TAR</text>
  
  <!-- Field Day Text -->
  <text x="60" y="23" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="7" font-weight="600">FIELD DAY</text>
  
  <!-- Right side signal indicator -->
  <g>
    <circle cx="105" cy="10" r="1.2" fill="#00ff00" opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="109" cy="12" r="0.8" fill="#00ff00" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
