<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" stroke="#1e40af" stroke-width="3"/>
  
  <!-- Radio waves -->
  <g stroke="url(#waveGradient)" stroke-width="2.5" fill="none">
    <circle cx="100" cy="100" r="35" opacity="0.8"/>
    <circle cx="100" cy="100" r="50" opacity="0.6"/>
    <circle cx="100" cy="100" r="65" opacity="0.4"/>
  </g>
  
  <!-- Central antenna/tower -->
  <g fill="#ffffff">
    <!-- Base -->
    <rect x="94" y="140" width="12" height="10" rx="2"/>
    <!-- Main tower -->
    <rect x="97" y="65" width="6" height="75" rx="1"/>
    <!-- Top element -->
    <rect x="92" y="60" width="16" height="3" rx="1.5"/>
    <!-- Cross elements -->
    <rect x="90" y="80" width="20" height="1.5" rx="0.75"/>
    <rect x="90" y="100" width="20" height="1.5" rx="0.75"/>
    <rect x="90" y="120" width="20" height="1.5" rx="0.75"/>
  </g>
  
  <!-- Clean text -->
  <text x="100" y="35" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">FIELD DAY</text>
  <text x="100" y="180" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="normal">LOGGER</text>
</svg>
