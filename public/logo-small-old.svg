<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#4a90e2" stroke="#2d5a8c" stroke-width="2"/>
  
  <!-- Radio waves -->
  <path d="M 18 32 A 14 14 0 0 1 46 32" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <path d="M 14 32 A 18 18 0 0 1 50 32" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Antenna tower -->
  <rect x="30.5" y="18" width="3" height="28" fill="#ffffff"/>
  
  <!-- Antenna elements -->
  <line x1="24" y1="22" x2="40" y2="22" stroke="#ffffff" stroke-width="2"/>
  <line x1="26" y1="28" x2="38" y2="28" stroke="#ffffff" stroke-width="1.5"/>
  
  <!-- Base -->
  <rect x="28" y="46" width="8" height="3" fill="#ffffff"/>
  
  <!-- Callsign -->
  <text x="32" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff">K8TAR</text>
  
  <!-- Activity indicator -->
  <circle cx="48" cy="16" r="2" fill="#00ff00">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
