<?xml version="1.0" encoding="UTF-8"?>
<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <dropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background rounded rectangle -->
  <rect x="10" y="10" width="300" height="160" rx="20" ry="20" fill="url(#bgGradient)" stroke="#1e40af" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Radio waves (positioned on left side) -->
  <g stroke="url(#waveGradient)" stroke-width="2" fill="none">
    <circle cx="80" cy="90" r="25" opacity="0.8"/>
    <circle cx="80" cy="90" r="35" opacity="0.6"/>
    <circle cx="80" cy="90" r="45" opacity="0.4"/>
  </g>
  
  <!-- Central antenna/tower (left side) -->
  <g fill="#ffffff">
    <!-- Base -->
    <rect x="76" y="125" width="8" height="8" rx="2"/>
    <!-- Main tower -->
    <rect x="78" y="60" width="4" height="65" rx="1"/>
    <!-- Top element -->
    <rect x="74" y="57" width="12" height="2" rx="1"/>
    <!-- Cross elements -->
    <rect x="72" y="75" width="16" height="1" rx="0.5"/>
    <rect x="72" y="90" width="16" height="1" rx="0.5"/>
    <rect x="72" y="105" width="16" height="1" rx="0.5"/>
  </g>
  
  <!-- Main Title Text -->
  <text x="160" y="60" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="bold">K8TAR</text>
  
  <!-- Field Day Text -->
  <text x="160" y="90" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="600">FIELD DAY</text>
  
  <!-- Logger Text -->
  <text x="160" y="115" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="16" font-weight="normal">LOGGER</text>
  
  <!-- Right side decorative elements -->
  <g fill="#60a5fa" opacity="0.6">
    <circle cx="260" cy="50" r="3"/>
    <circle cx="275" cy="45" r="2"/>
    <circle cx="250" cy="40" r="2"/>
    <circle cx="270" cy="130" r="3"/>
    <circle cx="285" cy="125" r="2"/>
    <circle cx="255" cy="135" r="2"/>
  </g>
  
  <!-- Signal indicator dots with animation -->
  <g>
    <circle cx="290" cy="30" r="2" fill="#00ff00" opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="285" cy="35" r="1.5" fill="#00ff00" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="295" cy="37" r="1.5" fill="#00ff00" opacity="0.4">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
