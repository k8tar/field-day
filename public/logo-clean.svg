<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGradient)" stroke="#1e40af" stroke-width="4"/>
  
  <!-- Radio waves -->
  <g stroke="url(#waveGradient)" stroke-width="3" fill="none">
    <circle cx="128" cy="128" r="45" opacity="0.8"/>
    <circle cx="128" cy="128" r="65" opacity="0.6"/>
    <circle cx="128" cy="128" r="85" opacity="0.4"/>
  </g>
  
  <!-- Central antenna/tower -->
  <g fill="#ffffff">
    <!-- Base -->
    <rect x="120" y="180" width="16" height="12" rx="2"/>
    <!-- Main tower -->
    <rect x="124" y="80" width="8" height="100" rx="1"/>
    <!-- Top element -->
    <rect x="118" y="75" width="20" height="4" rx="2"/>
    <!-- Cross elements -->
    <rect x="115" y="100" width="26" height="2" rx="1"/>
    <rect x="115" y="130" width="26" height="2" rx="1"/>
    <rect x="115" y="160" width="26" height="2" rx="1"/>
  </g>
  
  <!-- Field Day text -->
  <text x="128" y="45" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold">FIELD DAY</text>
  <text x="128" y="230" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="normal">LOGGER</text>
</svg>
