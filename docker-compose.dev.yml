services:
  fieldday-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"  # Frontend
      - "3030:3030"  # Backend API
    volumes:
      - .:/app:cached
      - /app/node_modules
      - /app/backend-service/target
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    networks:
      - fieldday-network
    restart: unless-stopped
    command: npm run dev

networks:
  fieldday-network:
    driver: bridge
