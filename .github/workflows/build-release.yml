name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - 'k8tar-fieldday-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to upload artifacts to during a manual backfill run.
        required: false
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Rust backend
      working-directory: backend-service
      run: cargo build --release
      
    - name: Build Vue application
      run: npm run build
      
    - name: Build Electron app
      run: npm run build && npx electron-builder --win --publish never
      
    - name: Setup Inno Setup
      run: choco install innosetup
        
    - name: Create installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\field-day-logger.iss
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: windows-release
        path: |
          installer/*.exe
          dist-installers/*.exe
          
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Rust backend
      working-directory: backend-service
      run: cargo build --release
      
    - name: Build Vue application
      run: npm run build
      
    - name: Build Electron app
      run: npm run build && npx electron-builder --mac --publish never
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: macos-release
        path: |
          dist-installers/*.dmg
          dist-installers/*.zip
        
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Rust backend
      working-directory: backend-service
      run: cargo build --release
      
    - name: Build Vue application
      run: npm run build
      
    - name: Build Electron app
      run: npm run build && npx electron-builder --linux AppImage deb rpm --publish never
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: linux-release
        path: |
          dist-installers/*.AppImage
          dist-installers/*.deb
          dist-installers/*.rpm
          
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
        files: |
          windows-release/*
          macos-release/*
          linux-release/*
        draft: false
        overwrite_files: true
        prerelease: ${{ contains(github.ref_name, '-beta') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
